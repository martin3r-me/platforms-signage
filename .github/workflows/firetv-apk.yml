name: Fire TV APK

# Baut die signierte Kiosk-APK und stellt sie als Artefakt bereit.
# Voraussetzung: Repository-Secrets (siehe firetv/README.md):
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#   ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD

on:
  workflow_dispatch:
  push:
    paths:
      - 'firetv/**'
      - '.github/workflows/firetv-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firetv
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed APK (v1 only)
        run: >
          gradle assembleRelease
          -PKEYSTORE_FILE="$RUNNER_TEMP/release.keystore"
          -PKEYSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          -PKEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}"
          -PKEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signage-player-apk
          path: firetv/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
