name: Fire TV Keystore (einmalig)

# Erzeugt EINMALIG einen Signatur-Keystore auf dem Runner (kein lokales Java
# noetig) und legt ihn als Artefakt ab. Inhalt danach als Repo-Secrets setzen:
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#   ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
# Danach diesen Workflow nicht erneut ausfuehren (sonst neuer Key -> Updates
# erfordern Neuinstallation).

on:
  workflow_dispatch:

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore + secrets file
        run: |
          ALIAS="signage"
          STOREPASS="$(openssl rand -hex 24)"
          KEYPASS="$STOREPASS"
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STOREPASS" -keypass "$KEYPASS" \
            -dname "CN=BHG Digital Signage, O=BHG Digital, C=DE"
          {
            echo "ANDROID_KEY_ALIAS=$ALIAS"
            echo "ANDROID_KEYSTORE_PASSWORD=$STOREPASS"
            echo "ANDROID_KEY_PASSWORD=$KEYPASS"
            echo "ANDROID_KEYSTORE_BASE64=$(base64 -w0 release.keystore)"
          } > firetv-signing-secrets.txt

      - name: Upload secrets bundle
        uses: actions/upload-artifact@v4
        with:
          name: firetv-signing-secrets
          path: firetv-signing-secrets.txt
          retention-days: 1
